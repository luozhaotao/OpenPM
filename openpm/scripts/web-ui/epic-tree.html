<style>.epic-card { background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden } .epic-header { padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer } .epic-header:hover { background:var(--hover) } .epic-name { font-weight:600;font-size:13px } .epic-info { flex:1 } .task-row { padding:8px 18px 8px 52px;display:flex;align-items:center;gap:10px;font-size:12px;border-top:1px solid var(--border-light);display:none } .epic-card.open .task-row { display:flex } .task-dot { width:8px;height:8px;border-radius:50%;flex-shrink:0 } .task-dot.todo { background:#9ca3af } .task-dot.in_progress { background:var(--primary) } .task-dot.done { background:var(--success) }</style>
<div style="padding:20px;display:flex;gap:20px">
  <div style="flex:1.3" id="epic-list"></div>
  <div style="flex:0.7;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px"><h3 style="font-size:12px;font-weight:600;margin-bottom:12px">概览</h3><div id="epic-stats"></div></div>
</div>
<script>
async function loadEpics() {
  var epics = await api('epics');
  var tasks = await api('tasks');
  var allTasks = tasks.tasks || [];
  var html = '';
  var totalDone = 0;
  var totalAll = 0;
  for (var i = 0; i < (epics.epics || []).length; i++) {
    var e = epics.epics[i];
    var etasks = allTasks.filter(function(t) { return t.epic === e.id; });
    var done = etasks.filter(function(t) { return t.status === 'done'; }).length;
    totalDone += done;
    totalAll += etasks.length;
    html += '<div class="epic-card open"><div class="epic-header" onclick="this.parentElement.classList.toggle(\'open\')"><div style="font-weight:700;color:var(--primary)">' + e.title + '</div><span style="font-size:11px;color:var(--text-muted)">' + done + '/' + etasks.length + ' · ' + e.status + '</span></div>';
    for (var j = 0; j < etasks.length; j++) {
      var t = etasks[j];
      html += '<div class="task-row"><span class="task-dot ' + t.status + '"></span><span style="font-family:monospace;font-size:10px;color:var(--text-muted)">' + t.id + '</span><span>' + t.title + '</span></div>';
    }
    html += '</div>';
  }
  document.getElementById('epic-list').innerHTML = html || '<p style="color:var(--text-muted)">暂无 Epic</p>';
  document.getElementById('epic-stats').innerHTML =
    '<p>Epic: <strong>' + (epics.epics || []).length + '</strong></p>' +
    '<p>任务: <strong>' + allTasks.length + '</strong></p>' +
    '<p>完成: <strong style="color:var(--success)">' + totalDone + '</strong></p>';
}
window.initPage = function(p) { if (p === 'epic-tree') loadEpics(); };
window.refreshPage = function() { if (currentPage === 'epic-tree') loadEpics(); };
</script>
